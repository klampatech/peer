services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    # Backend not exposed to host - only accessible through nginx
    # Port 3000 is internal only via docker network
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=https://204.168.181.142
      - TURN_HOST=204.168.181.142
      - TURN_SECRET=${TURN_SECRET}
      - TURN_REALM=peer
      - COTURN_PORT=3478
      - RATE_LIMIT_MAX_POINTS=100
      - RATE_LIMIT_WINDOW_MS=60000
      - LOG_LEVEL=info
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - proxy-network
      - turn-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    read_only: true

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        - VITE_API_URL=https://204.168.181.142
    restart: unless-stopped
    networks:
      - proxy-network
    volumes:
      - frontend-cache:/var/cache/nginx
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  coturn:
    image: coturn/coturn:4.6.2
    user: "1001:1001"
    security_opt:
      - no-new-privileges:true
    ports:
      - "5349:5349/udp"
      - "5349:5349/tcp"
    environment:
      - TURN_SECRET=${TURN_SECRET}
      - REALM=peer
    volumes:
      - coturn-data:/var/lib/coturn
      - certbot-etc:/etc/letsencrypt:ro
      - ./turnserver.conf:/etc/coturn/turnserver.conf
      - ./coturn-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    command: ["turnserver", "-c", "/etc/coturn/turnserver.conf", "-n"]
    restart: unless-stopped
    networks:
      - turn-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    read_only: true

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/ssl/peer:/etc/ssl/peer:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - nginx-data:/var/log/nginx
      - nginx-cache:/var/cache/nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - proxy-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    read_only: true

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    # Production certificates - no staging flag
    # Update DOMAIN and CERTBOT_EMAIL in your environment before running
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${CERTBOT_EMAIL:-admin@example.com} --agree-tos --no-eff-email -d ${DOMAIN:-peer}
    networks:
      - proxy-network

volumes:
  backend-data:
  coturn-data:
  nginx-data:
  nginx-cache:
  frontend-cache:
  certbot-etc:
  certbot-var:

networks:
  # nginx -> frontend, nginx -> backend
  proxy-network:
    driver: bridge
  # backend -> coturn (for TURN credential validation)
  # nginx CANNOT reach coturn (isolation)
  turn-network:
    driver: bridge
