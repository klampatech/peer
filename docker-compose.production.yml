services:
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TURN_SECRET=${TURN_SECRET:-change-me-in-production}
      - TURN_REALM=peer
      - COTURN_PORT=3478
      - RATE_LIMIT_MAX_POINTS=100
      - RATE_LIMIT_WINDOW_MS=60000
      - LOG_LEVEL=info
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - peer-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    read_only: true

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - peer-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    read_only: true

  coturn:
    image: coturn/coturn:4.6.2
    user: "1001:1001"
    security_opt:
      - no-new-privileges:true
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"
      - "5349:5349/tcp"
    environment:
      - TURN_SECRET=${TURN_SECRET:-change-me-in-production}
      - REALM=peer
    volumes:
      - coturn-data:/var/lib/coturn
    restart: unless-stopped
    networks:
      - peer-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    read_only: true

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - nginx-data:/var/log/nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - peer-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    read_only: true

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    # Remove --staging flag for production certificates
    # Also update DOMAIN in your environment before running
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${CERTBOT_EMAIL:-admin@example.com} --agree-tos --no-eff-email --staging -d ${DOMAIN:-peer}
    networks:
      - peer-network

volumes:
  backend-data:
  coturn-data:
  nginx-data:
  certbot-etc:
  certbot-var:

networks:
  peer-network:
    driver: bridge
