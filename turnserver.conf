# Coturn TURN server configuration

# Listening port
listening-port=3478
tls-listening-port=5349

# TLS certificates (mounted from host)
cert=/etc/letsencrypt/live/peer/fullchain.pem
pkey=/etc/letsencrypt/live/peer/privkey.pem

# TLS configuration - use modern ciphers only
cipher-list=ECDHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256

# Realm
realm=peer

# Use fingerprints in the TURN messages
fingerprint

# Use long-term credential mechanism
use-auth-secret
secret-key-file=/etc/coturn/turn_server_db

# Total quota
total-quota=100

# Maximum bytes per allocation
max-bps=0

# No WebSocket support (WebRTC uses HTTP for signaling, not TURN over WS)
# The TURN server only handles relay for media

# Logging
syslog
simple-log

# STUN
# STUN server functionality is enabled by default
