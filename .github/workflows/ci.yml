name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @peer/shared build

      - name: Run typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @peer/shared build

      - name: Run tests
        run: pnpm test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build packages
        run: pnpm build

      - name: Start backend and frontend
        run: |
          # Start backend (ts-node dev server on port 3000)
          cd packages/backend
          pnpm dev &
          echo $! > /tmp/backend.pid

          # Start frontend (vite dev server on port 5173)
          cd ../frontend
          pnpm dev &
          echo $! > /tmp/frontend.pid
        env:
          NODE_ENV: test

      - name: Wait for services to be ready
        run: |
          for i in $(seq 1 30); do
            BACKEND_OK=0
            FRONTEND_OK=0
            curl -sf http://localhost:3000/health > /dev/null 2>&1 && BACKEND_OK=1
            curl -sf http://localhost:5173 > /dev/null 2>&1 && FRONTEND_OK=1
            if [ "$BACKEND_OK" -eq 1 ] && [ "$FRONTEND_OK" -eq 1 ]; then
              echo "Both services ready after ${i} attempts"
              exit 0
            fi
            echo "Waiting for services... backend=$BACKEND_OK frontend=$FRONTEND_OK ($i/30)"
            sleep 2
          done
          echo "FAIL: Services did not become ready within 60 seconds"
          exit 1

      - name: Run E2E tests
        run: pnpm exec playwright test
        env:
          CI: 'true'

      - name: Stop services
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill $(cat /tmp/backend.pid) 2>/dev/null || true
            rm -f /tmp/backend.pid
          fi
          if [ -f /tmp/frontend.pid ]; then
            kill $(cat /tmp/frontend.pid) 2>/dev/null || true
            rm -f /tmp/frontend.pid
          fi

  security-headers:
    name: Security Headers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Start backend
        run: |
          cd packages/backend
          pnpm dev &
          echo $! > /tmp/backend.pid
        env:
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:5173

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend ready after ${i} attempts"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "FAIL: Backend did not become ready within 60 seconds"
          exit 1

      - name: Verify security headers
        run: node tests/security/http-headers.js
        env:
          BASE_URL: http://localhost:3000

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill $(cat /tmp/backend.pid) 2>/dev/null || true
            rm -f /tmp/backend.pid
          fi

  security-scan:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Start backend
        run: |
          cd packages/backend
          pnpm dev &
          echo $! > /tmp/backend.pid
        env:
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:5173

      - name: Start nginx
        run: |
          docker compose -f docker-compose.yml up -d nginx
          echo $! > /tmp/nginx.pid

      - name: Wait for services to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1 && curl -sf http://localhost/health > /dev/null 2>&1; then
              echo "Services ready after ${i} attempts"
              exit 0
            fi
            echo "Waiting for services... ($i/30)"
            sleep 2
          done
          echo "FAIL: Services did not become ready within 60 seconds"
          exit 1

      - name: Run OWASP ZAP scan
        run: |
          # Run ZAP baseline scan via docker against nginx (which proxies to backend)
          docker run --rm \
            --network="host" \
            -v "$(pwd):/zap/wrk:rw" \
            -t owasp/zap2docker-stable zap.sh \
            -cmd -quickurl http://localhost/health \
            -quickprogress \
            -timeout 120 \
            -reportfile zap-report.html \
            -jsonreport zap-report.json

      - name: Check for high-severity issues
        run: |
          # Check if JSON report exists and has high severity issues
          if [ -f zap-report.json ]; then
            HIGH=$(grep -o '"High":[0-9]*' zap-report.json | grep -o '[0-9]*' | head -1 || echo "0")
            echo "High severity issues: $HIGH"
            if [ "$HIGH" -gt 0 ]; then
              echo "FAIL: High severity vulnerabilities found!"
              exit 1
            fi
          fi

      - name: Stop services
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill $(cat /tmp/backend.pid) 2>/dev/null || true
            rm -f /tmp/backend.pid
          fi
          docker compose -f docker-compose.yml down 2>/dev/null || true

  load-test:
    name: Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Start backend
        run: |
          cd packages/backend
          pnpm dev &
          echo $! > /tmp/backend.pid
        env:
          NODE_ENV: test
          TURN_SECRET: test-secret-for-ci

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend ready after ${i} attempts"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "FAIL: Backend did not become ready within 60 seconds"
          exit 1

      - name: Run k6 load test
        run: |
          # Install k6 if not available (non-blocking - warns on failure)
          if ! command -v k6 &> /dev/null; then
            echo "k6 not found, installing..."
            sudo gpg -k
            sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
            echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
            sudo apt-get update
            sudo apt-get install k6
          fi

          # Run load test with reduced duration for CI (30s instead of 10m)
          # Results are non-blocking (warn only)
          k6 run tests/load/signalling-server.js --duration=30s --vus=10 --mode=both --summary-export=tests/load/signalling-server-summary.json || true

      - name: Upload load test summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-summary
          path: tests/load/signalling-server-summary.json

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill $(cat /tmp/backend.pid) 2>/dev/null || true
            rm /tmp/backend.pid
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/backend/dist/
            packages/frontend/dist/
            packages/shared/dist/
          retention-days: 7
