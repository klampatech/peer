name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build packages
        run: pnpm build

      - name: Start backend
        run: |
          cd packages/backend
          pnpm dev &
          echo $! > /tmp/backend.pid
        env:
          NODE_ENV: test

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend ready after ${i} attempts"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "FAIL: Backend did not become ready within 60 seconds"
          exit 1

      - name: Run E2E tests
        run: pnpm exec playwright test

  security-headers:
    name: Security Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies and build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Start Docker Compose services
        run: |
          docker compose -f docker-compose.yml up -d
          # Give services time to start
          sleep 10

      - name: Wait for nginx to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/health > /dev/null 2>&1 || curl -sf http://localhost:80 > /dev/null 2>&1; then
              echo "nginx ready after ${i} attempts"
              exit 0
            fi
            echo "Waiting for nginx... ($i/30)"
            sleep 2
          done
          echo "FAIL: nginx did not become ready within 60 seconds"
          exit 1

      - name: Verify security headers
        run: node tests/security/http-headers.js
        env:
          BASE_URL: http://localhost

  security-scan:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies and build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Start Docker Compose services
        run: |
          docker compose -f docker-compose.yml up -d
          # Give services time to start
          sleep 10

      - name: Wait for nginx to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/health > /dev/null 2>&1 || curl -sf http://localhost:80 > /dev/null 2>&1; then
              echo "nginx ready after ${i} attempts"
              exit 0
            fi
            echo "Waiting for nginx... ($i/30)"
            sleep 2
          done
          echo "FAIL: nginx did not become ready within 60 seconds"
          exit 1

      - name: Run OWASP ZAP scan
        run: |
          # Run ZAP baseline scan using Docker - scan nginx (port 80), not backend
          docker run --rm \
            --network="host" \
            -v "$(pwd):/zap/wrk:rw" \
            -t owasp/zap2docker-stable zap.sh \
            -cmd -quickurl http://localhost \
            -quickprogress \
            -timeout 120 \
            -reportfile zap-report.html \
            -jsonreport zap-report.json

      - name: Check for high-severity issues
        run: |
          # Check if JSON report exists and has high severity issues
          if [ -f zap-report.json ]; then
            HIGH=$(grep -o '"High":[0-9]*' zap-report.json | grep -o '[0-9]*' | head -1 || echo "0")
            echo "High severity issues: $HIGH"
            if [ "$HIGH" -gt 0 ]; then
              echo "FAIL: High severity vulnerabilities found!"
              exit 1
            fi
          fi

  load-test:
    name: Load Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Start backend
        run: |
          cd packages/backend
          pnpm dev &
          echo $! > /tmp/backend.pid
        env:
          NODE_ENV: test
          TURN_SECRET: test-secret-for-ci

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend ready after ${i} attempts"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "FAIL: Backend did not become ready within 60 seconds"
          exit 1

      - name: Run k6 load test
        run: |
          # Install k6 if not available (non-blocking - warns on failure)
          if ! command -v k6 &> /dev/null; then
            echo "k6 not found, installing..."
            sudo gpg -k
            sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
            echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
            sudo apt-get update
            sudo apt-get install k6
          fi

          # Run load test with reduced duration for CI (30s instead of 10m)
          # Results are non-blocking (warn only)
          k6 run tests/load/signalling-server.js --duration=30s --vus=10 --mode=both --summary-export=tests/load/signalling-server-summary.json || true

      - name: Upload load test summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-summary
          path: tests/load/signalling-server-summary.json

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/backend/dist/
            packages/frontend/dist/
            packages/shared/dist/
          retention-days: 7
