version: '3.8'

services:
  # Frontend (React)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: peer-frontend
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - peer-network

  # Signalling server (Node.js + Socket.IO)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: peer-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=http://localhost:5173
      - TURN_SECRET=${TURN_SECRET}
      - COTURN_PORT=3478
      - TURN_REALM=peer
      - RATE_LIMIT_MAX_POINTS=100
      - RATE_LIMIT_WINDOW_MS=60000
    volumes:
      - ./packages/backend/data:/app/data
    restart: unless-stopped
    networks:
      - peer-network

  # Nginx reverse proxy
  nginx:
    image: nginx:1.26-alpine
    container_name: peer-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - peer-network

  # coturn TURN server
  coturn:
    image: coturn/coturn:4.6.2-alpine
    container_name: peer-coturn
    ports:
      - "5349:5349"
      - "5349:5349/udp"
    environment:
      - TURN_SECRET=${TURN_SECRET}
      - REALM=peer
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    restart: unless-stopped
    networks:
      - peer-network

networks:
  peer-network:
    driver: bridge
